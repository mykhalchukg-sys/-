<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Замовлення суші</title>

<style>

body{
    font-family: Arial;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
}

h2{
    text-align:center;
    color:#333;
}

table{
    margin:auto;
    border-collapse: collapse;
    width: 500px;
    background:white;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
    border-radius:10px;
    overflow:hidden;
}

th{
    background:#ff6b6b;
    color:white;
    padding:12px;
    font-size:20px;
}

td{
    padding:10px;
    border-bottom:1px solid #eee;
}

tr:hover{
    background:#f5f5f5;
}

input[type="text"],
input[type="number"],
input[type="password"],
input[type="tel"]{
    width:95%;
    padding:6px;
    border-radius:5px;
    border:1px solid #ccc;
}

select{
    width:95%;
    padding:6px;
    border-radius:5px;
}

.buttons{
    text-align:center;
    padding:15px;
}

input[type="submit"]{
    background:#28a745;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:6px;
    cursor:pointer;
}

input[type="reset"]{
    background:#dc3545;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:6px;
    cursor:pointer;
}

input[type="submit"]:hover{
    background:#218838;
}

input[type="reset"]:hover{
    background:#c82333;
}

</style>
</head>

<body>

<h2>🍣 Форма замовлення суші 🍣</h2>

<form>

<table>

<tr>
<th colspan="2">Дані замовника</th>
</tr>

<tr>
<td>Ім’я отримувача</td>
<td><input type="text" name="name" required></td>
</tr>

<tr>
<td>Телефон</td>
<td><input type="tel" name="phone" placeholder="+380..."></td>
</tr>

<tr>
<td>Адреса доставки</td>
<td><input type="text" name="address"></td>
</tr>

<tr>
<th colspan="2">Вибір суші</th>
</tr>

<tr>
<td>Оберіть сет</td>
<td>
<select name="set">
<option>Філадельфія</option>
<option>Каліфорнія</option>
<option>Дракон</option>
<option>Сет Самурай</option>
<option>Великий мікс</option>
</select>
</td>
</tr>

<tr>
<td>Кількість порцій</td>
<td><input type="number" min="1" max="10"></td>
</tr>

<tr>
<td>Соуси</td>
<td>
<input type="checkbox"> Соєвий соус<br>
<input type="checkbox"> Спайсі соус<br>
<input type="checkbox"> Теріякі<br>
<input type="checkbox"> Васабі
</td>
</tr>

<tr>
<td>Додатково</td>
<td>
<input type="checkbox"> Імбир<br>
<input type="checkbox"> Сир Філадельфія<br>
<input type="checkbox"> Авокадо<br>
<input type="checkbox"> Лосось
</td>
</tr>

<tr>
<td>Спосіб оплати</td>
<td>
<input type="radio" name="pay"> Готівкою<br>
<input type="radio" name="pay"> Картою<br>
<input type="radio" name="pay"> Онлайн
</td>
</tr>

<tr>
<td colspan="2" class="buttons">
<input type="submit" value="Замовити 🍣">
<input type="reset" value="Очистити">
</td>
</tr>

</table>

</form>

</body>
</html>
